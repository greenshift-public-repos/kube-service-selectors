name: CI

permissions:
  contents: read

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          mkdir -p reports
          bash run_tests.sh

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        run: |
          az cloud set -n azurecloud

          az-login() {
            az login --service-principal \
              --username "$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.appId')" \
              --password "$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.password')" \
              --tenant "$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.tenant')"
          }

          for (( i=1; i<=3; i++ )); do
            echo "::group::az login (attempt ${i})"
            if az-login; then echo "::endgroup::"; exit 0; fi
            echo "::endgroup::"
            sleep 10
          done
          exit 1

      - name: Log in to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}.azurecr.io

      - name: Set environment variables
        run: |
          echo "GIT_HASH=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "RELEASE_TAG=${TAG}" >> "$GITHUB_ENV"
            echo "VERSION=${TAG}" >> "$GITHUB_ENV"
          fi

      - name: Build and push image
        run: |
          bash build.sh -r "${{ vars.ACR_NAME }}.azurecr.io"
          echo "Image pushed: ${{ vars.ACR_NAME }}.azurecr.io/kube-service-selectors:${GIT_HASH}"

      - name: Push release version tag
        if: env.RELEASE_TAG != ''
        run: |
          set -eo pipefail
          REGISTRY="${{ vars.ACR_NAME }}.azurecr.io"
          IMAGE=kube-service-selectors
          docker pull "${REGISTRY}/${IMAGE}:${GIT_HASH}"
          docker tag "${REGISTRY}/${IMAGE}:${GIT_HASH}" "${REGISTRY}/${IMAGE}:${RELEASE_TAG}"
          docker push "${REGISTRY}/${IMAGE}:${RELEASE_TAG}"
          echo "Image pushed: ${REGISTRY}/${IMAGE}:${RELEASE_TAG}"
